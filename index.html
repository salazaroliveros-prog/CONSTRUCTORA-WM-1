<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTRUCTORA WM/M&S Platform</title>
    <meta name="description" content="Plataforma integrada de control operativo, APU, proyectos, reportes y alertas para CONSTRUCTORA WM/M&S.">
    <meta name="theme-color" content="#1a2b44">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dist/assets/css/tailwind.generated.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="assets/js/env.js"></script>
</head>
<body>
    <noscript>Activa JavaScript para utilizar la plataforma CONSTRUCTORA WM/M&amp;S.</noscript>
    <script type="module" src="assets/js/app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW error', err));
        });
      }
    </script>
</body>
</html>
